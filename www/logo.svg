<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" role="img" aria-labelledby="title desc">
  <title id="title">Investors Helper monogram</title>
  <desc id="desc">The letters IH over a cyan to purple gradient.</desc>
  <defs>
    <linearGradient id="gradient" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#00BCD4"/>
      <stop offset="1" stop-color="#9C27B0"/>
    </linearGradient>
  </defs>
  <rect width="64" height="64" rx="14" fill="url(#gradient)"/>
  <text x="32" y="41" text-anchor="middle" font-family="Arial, sans-serif" font-size="27" font-weight="700" fill="#fff">IH</text>
</svg>
